{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

<div class="servicios-grid">
  <a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='banos') }}">BAÑOS</a>
<a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='banosgarrapaticidas') }}">BAÑOS GARRAPATICIDAS</a>
<a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='banomedicado') }}">BAÑO MEDICADO</a>
  <a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='cortepelo') }}">CORTE DE PELO</a>
  <a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='deslanado') }}">DESLANADO</a>
  <a class="btn-estetica" href="{{ url_for('esteticaform_servicio', servicio='banodermatologico') }}">BAÑO DERMATOLÓGICO</a>
  <a class="btn-estetica btn-estetica--full" href="{{ url_for('esteticaform_servicio', servicio='extras') }}">EXTRAS</a>
</div>


<style>
/* Layout general: sidebar + panel derecho */
.estetica-layout {
  display: flex;
}

/* Ajusta según el ancho de tu sidebar */
.estetica-layout .panel-estetica {
  flex: 1;
  padding: 2rem 1rem;
  display: grid;
  grid-template-columns: repeat(3, minmax(180px, 1fr));
  grid-gap: 1.5rem;
  justify-items: center;
}

/* Botones */
.btn-estetica {
  background-color: #071529;        /* mismo tono que tu menú */
  color: #ffffff;
  border-radius: 20px;
  border: 1px solid #1b2a3c;
  padding: 1.2rem 1rem;
  text-align: center;
  font-weight: 600;
  letter-spacing: .5px;
  width: 100%;
  max-width: 260px;
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease, background-color .15s;
}

.btn-estetica:hover {
  background-color: #0d223a;
  box-shadow: 0 6px 14px rgba(0,0,0,.35);
  transform: translateY(-2px);
}

/* Botón "EXTRAS" ocupando toda la fila */
.btn-estetica--full {
  grid-column: 1 / -1;
  max-width: 340px;
}

/* Responsivo tablet */
@media (max-width: 900px) {
  .estetica-layout .panel-estetica {
    grid-template-columns: repeat(2, minmax(160px, 1fr));
  }
}

/* Responsivo móvil */
@media (max-width: 600px) {
  .estetica-layout {
    flex-direction: column;     /* sidebar arriba o colapsado según tu base */
  }

  .estetica-layout .panel-estetica {
    grid-template-columns: 1fr;
    padding: 1.5rem 1rem;
  }

  .btn-estetica {
    max-width: 100%;
  }

  .btn-estetica--full {
    grid-column: auto;
  }
}

.servicios-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 columnas */
    gap: 20px; /* separación entre botones */
    justify-items: center; /* centrar cada botón */
}

/* el 7º botón (EXTRAS) ocupa las 3 columnas centrado abajo */
.servicios-grid button:nth-child(7) {
    grid-column: 2 / 3; /* se coloca en la columna central */
}

</style>
{% endblock %}

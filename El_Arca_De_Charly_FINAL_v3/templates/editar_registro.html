{% extends "base.html" %}

{% block title %}Editar Registro{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Editar Registro Clínico</h2>
    
    <form method="POST">
        <input type="hidden" name="pet_id" value="{{ pet_id }}">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha y Hora <span class="text-danger">*</span></label>
                        <input type="datetime-local" name="date" class="form-control" 
                               value="{{ record.date.strftime('%Y-%m-%dT%H:%M') if record.date else '' }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Peso (kg)</label>
                        <input type="number" step="0.1" min="0" name="weight" 
                               value="{{ record.weight or '' }}" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Talla (cm)</label>
                        <input type="number" step="0.1" min="0" name="height" 
                               value="{{ record.height or '' }}" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Temperatura (°C)</label>
                        <input type="number" step="0.1" min="30" max="45" name="temperature" 
                               value="{{ record.temperature or '' }}" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Desparasitado</label>
                        <input type="date" name="dewormed" 
                               value="{{ record.dewormed.strftime('%Y-%m-%d') if record.dewormed else '' }}" class="form-control">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Vacunado</label>
                        <input type="date" name="vaccinated" 
                               value="{{ record.vaccinated.strftime('%Y-%m-%d') if record.vaccinated else '' }}" class="form-control">
                    </div>
                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Cirugía</label>
                        <input type="text" name="surgery" value="{{ record.surgery or '' }}" 
                               class="form-control" placeholder="Ej: Esterilización, Fractura, etc.">
                    </div>
                    
                    <div class="col-12 col-md-6">
                        <label class="form-label">Última Cirugía</label>
                        <input type="date" name="last_surgery" 
                               value="{{ record.last_surgery.strftime('%Y-%m-%d') if record.last_surgery else '' }}" class="form-control">
                    </div>
                </div>
            </div>
            <div class="card-footer d-flex gap-2 justify-content-end">
                <a href="{{ url_for('historial_clinico', petid=pet_id, q=q) }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Actualizar Registro</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<h2>Configuración</h2>
<form method="post" enctype="multipart/form-data" class="form">
  <label>Nombre comercial</label>
  <input name="brand_name" value="{{ name }}">
  <label>Logo (png/jpg/webp)</label>
  <input type="file" name="brand_logo" accept=".png,.jpg,.jpeg,.webp">
  <p>Logo actual:</p>
  <img style="width:120px;border-radius:8px;border:1px solid #1f2937" src="{{ url_for('static', filename=logo) }}">
  <button>Guardar</button>
</form>
{% endblock %}

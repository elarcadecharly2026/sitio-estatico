<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- TEMA DINÁMICO -->
    <link id="theme-style" rel="stylesheet" href="{{ url_for('static', filename='css/theme-arca.css') }}">

    <title>{{ brand_name or 'El Arca De Charly' }}</title>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            🐾 {{ brand_name or 'El Arca' }}
        </div>
        <!-- aquí va tu menú actual -->
    </aside>

    <main class="main-content">

        <!-- TOPBAR -->
        <header class="topbar" style="display:flex; justify-content:space-between; align-items:center; padding:10px 20px;">
            
            <div>
                Panel Administrativo
            </div>

            <!-- SELECTOR DE TEMA -->
            <div>
                <select id="themeSelector" style="padding:5px 10px; border-radius:6px;">
                    <option value="theme-arca.css">Clásico</option>
                    <option value="theme-premium.css">Premium Verde</option>
                </select>
            </div>

        </header>

        <section class="content">
            {% block content %}{% endblock %}
        </section>

    </main>

    <!-- SCRIPT CAMBIO DE TEMA -->
    <script>
        const selector = document.getElementById("themeSelector");
        const themeLink = document.getElementById("theme-style");

        selector.addEventListener("change", function() {
            themeLink.href = "/static/css/" + this.value;
            localStorage.setItem("selectedTheme", this.value);
        });

        window.onload = function() {
            const savedTheme = localStorage.getItem("selectedTheme");
            if (savedTheme) {
                themeLink.href = "/static/css/" + savedTheme;
                selector.value = savedTheme;
            }
        }
    </script>

</body>
</html>

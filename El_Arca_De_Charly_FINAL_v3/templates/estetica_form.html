{% extends "base.html" %}
{% block content %}

<div class="estetica-layout">
  <div class="panel-form-estetica">
    <div class="form-header">
      <span></span>
      <h2>{{ titulo }}</h2>
    </div>

    <form method="POST" action="{{ url_for('esteticaform_servicio', servicio=servicio) }}">
      <div class="fila">
        <label>Fecha:</label>
        <input type="date" name="fecha">
      </div>

      <h3>Datos del propietario</h3>
      <div class="grid-2">
        <div>
          <label>Nombre:</label><input type="text" name="propietarionombre">
          <label>Dirección:</label><input type="text" name="propietariodireccion">
          <label>Número:</label>
          <input type="tel" name="propietarionumero" id="telefono" maxlength="10" pattern="[0-9]{10}" 
           title="Solo 10 dígitos numéricos" required placeholder="9981234567">
        </div>
      </div>

      <h3>Datos de la mascota</h3>
      <div class="grid-2">
        <div style="padding-bottom: 1%" >
          <label>Nombre:</label><input type="text" name="mascotanombre">
          <label>Sexo:</label>
          <select name="mascotasexo" required>
            <option value="">Seleccionar</option>
            <option value="masculino">Hembra</option>
            <option value="femenino">Macho</option>
          </select>
          <label>Edad:</label>
    <input type="text" name="mascotaedad" id="edad" maxlength="2" pattern="^(0[1-9]|[1-8][0-9]|9[0-9])$" 
           title="Edad de 01 a 99" required placeholder="05">
        </div>
        <div>
          <label>Raza:</label><input type="text" name="mascotaraza">
          <label>Color:</label><input type="text" name="mascotacolor">
          <label>Tamaño (cm):</label>
    <input type="number" name="mascotatamano" id="tamano" min="1" max="300" step="0.1" 
           title="Tamaño en centímetros" required placeholder="25.5">
        </div>
      </div>

      <!-- SERVICIO CORTE DE PELO-->
{% if servicio == 'cortepelo' %}
<div>
  <label>Tipo de corte:</label>
  <select name="tipocorte" required>
    <option value="">Seleccionar tipo</option>
    <option value="estandar">Estándar</option>
    <option value="artistica">Artística</option>
    <option value="deportiva">Deportiva</option>
    <option value="navidad">Navidad</option>
    <option value="halloween">Halloween</option>
    <option value="personalizado">Personalizado</option>
  </select>
</div>
{% endif %}


      <h3>Observaciones</h3>
      <textarea name="observaciones" rows="4"></textarea>

      <h3>Precio</h3>
<div class="precios">
  {% if servicio == 'cortepelo' %}
    <button type="button" class="btn-servicio" name="precio" value="350">$350</button>
    <button type="button" class="btn-servicio" name="precio" value="400">$400</button>
    <button type="button" class="btn-servicio" name="precio" value="450">$450</button>
    <button type="button" class="btn-servicio" name="precio" value="500">$500</button>
    <button type="button" class="btn-servicio" name="precio" value="550">$550</button>
    <button type="button" class="btn-servicio" name="precio" value="600">$600</button>
  {% else %}
    <!-- Precios originales para otros servicios -->
    <button type="button" class="btn-servicio" name="precio" value="300">$300</button>
    <button type="button" class="btn-servicio" name="precio" value="350">$350</button>
    <button type="button" class="btn-servicio" name="precio" value="400">$400</button>
    <button type="button" class="btn-servicio" name="precio" value="500">$500</button>
    <button type="button" class="btn-servicio" name="precio" value="550">$550</button>
  {% endif %}
</div>
<input type="hidden" name="precio" id="precio-input">
<input type="hidden" name="servicio" id="servicio-input">



      <div style="margin-top:20px;">
        <button type="submit" class="btn btn-primary">Guardar servicio</button>
      </div>


<script>
document.addEventListener('DOMContentLoaded', function() {
    const buttons = document.querySelectorAll('.btn-servicio');
    const form = document.querySelector('form');
    
    // Crear campo oculto para el nombre del servicio si no existe
    let servicioInput = document.querySelector('input[name="servicio"]');
    if (!servicioInput) {
        servicioInput = document.createElement('input');
        servicioInput.type = 'hidden';
        servicioInput.name = 'servicio';
        form.appendChild(servicioInput);
    }
    
    buttons.forEach(btn => {
        btn.addEventListener('click', function() {
            // Estilo visual actual
            buttons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            // Establecer precio
            const precioInput = document.querySelector('input[name="precio"]');
            if (precioInput) {
                precioInput.value = this.value;
            }
            
            // NUEVO: Establecer nombre del servicio automáticamente
            const servicioNombre = obtenerNombreServicio();
            servicioInput.value = servicioNombre;
            console.log('Servicio seleccionado:', servicioNombre); // Para debug
        });
    });
    
    // Función que determina el nombre basado en la URL o contexto
    function obtenerNombreServicio() {
        // Extraer servicio de la URL (ej: /esteticaform?servicio=banos)
        const urlParams = new URLSearchParams(window.location.search);
        const servicioUrl = urlParams.get('servicio');
        
        if (servicioUrl) {
            const nombres = {
                'banos': 'BAÑOS',
                'banosgarrapaticidas': 'BAÑOS GARRAPATICIDAS',
                'cortepelo': 'CORTE DE PELO'
            };
            return nombres[servicioUrl] || servicioUrl.toUpperCase();
        }
        
        // Fallback: usar el título de la página
        const titulo = document.querySelector('h2').textContent.trim();
        return titulo || 'SERVICIO';
    }
    
    // Validaciones existentes...
    form.addEventListener('submit', function(e) {
        const tel = document.getElementById('telefono');
        if (tel.value && !/^\d{10}$/.test(tel.value)) {
            alert('El teléfono debe tener exactamente 10 dígitos');
            tel.focus();
            e.preventDefault();
            return false;
        }
        
        const edad = document.getElementById('edad');
        if (edad.value && !/^([0-9]{1,2}|01|99)$/.test(edad.value)) {
            alert('La edad debe ser de 01 a 99');
            edad.focus();
            e.preventDefault();
            return false;
        }
        
        // Verificar que se seleccionó un servicio
        if (!servicioInput.value) {
            alert('Debes seleccionar un precio/servicio');
            e.preventDefault();
            return false;
        }
    });
});
</script>

<style>
.btn-servicio {
  padding: 6px 12px;
  border: 1px solid #1f2937;
  background: #0f1a31;
  cursor: pointer;
  color: var(--text);
}

/* lo que antes ponías en :hover, ponlo también aquí */
.btn-servicio:hover,
.btn-servicio.active {
  background: #334155;
  color: white;
  border-color:#c5dbfb;
}


</style>
    </form>
  </div>
</div>

{% endblock %}

{% extends "base.html" %}
{% block content %}
<h2>Auditoría</h2>
<table class="table">
  <thead><tr><th>Fecha</th><th>Usuario</th><th>Acción</th><th>Entidad</th><th>Datos</th></tr></thead>
  <tbody>
  {% for r in rows %}
    <tr>
      <td>{{ r.ts }}</td>
      <td>{{ r.user_email }}</td>
      <td>{{ r.action }}</td>
      <td>{{ r.entity }}</td>
      <td style="max-width:480px;white-space:pre-wrap">{{ r.data }}</td>
    </tr>
  {% else %}
    <tr><td colspan="5">Sin registros</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<h2>Usuarios</h2>
<p><a class="btn" href="{{ safe_url('users_new') }}">+ Nuevo usuario</a></p>
<table class="table">
  <thead><tr><th>Email</th><th>Rol</th><th>Fecha</th><th></th></tr></thead>
  <tbody>
    {% for u in users %}
    <tr>
      <td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.created_at }}</td>
      <td>
        <a class="link" href="{{ safe_url('users_edit', uid=u.id) }}">Editar</a>
        <form method="post" action="{{ safe_url('users_delete', uid=u.id) }}" style="display:inline" onsubmit="return confirm('¿Eliminar?')">
          <button class="link danger">Eliminar</button>
        </form>
      </td>
    </tr>
    {% else %}
      <tr><td colspan="4">Sin usuarios</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

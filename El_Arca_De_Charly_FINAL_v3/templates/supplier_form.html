{% extends "base.html" %}

{% block content %}
<div style="max-width: 650px; margin: 0 auto; padding: 30px 20px;">
    <h2 style="color: var(--text); margin-bottom: 25px; font-size: 28px;">
        {% if supplier %}✏️ Editar Proveedor{% else %}➕ Nuevo Proveedor{% endif %}
    </h2>
    
    <form method="post" style="background: var(--bg); padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Nombre *</label>
            <input type="text" name="name" required style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;" 
                   value="{{ supplier.name if supplier else '' }}">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">RFC</label>
            <input maxlength="13" minlength="13" type="text" name="rfc" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;"
                   value="{{ supplier.rfc if supplier else '' }}">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Email</label>
            <input type="email" name="email" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;"
                   value="{{ supplier.email if supplier else '' }}">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Teléfono</label>
            <input maxlength="10" pattern="\d{10}" type="text" name="phone" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;"
                   value="{{ supplier.phone if supplier else '' }}">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Ciudad</label>
            <input type="text" name="city" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;"
                   value="{{ supplier.city if supplier else '' }}">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Dirección</label>
            <textarea name="address" rows="3" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; font-family: inherit;">{{ supplier.address if supplier else '' }}</textarea>
        </div>
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Notas</label>
            <textarea name="notes" rows="4" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; font-family: inherit;">{{ supplier.notes if supplier else '' }}</textarea>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 1; padding: 13px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                {% if supplier %}💾 Actualizar{% else %}✅ Crear Proveedor{% endif %}
            </button>
            <a href="{{ url_for('suppliers_list') }}" style="flex: 1; text-align: center; padding: 13px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;">❌ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

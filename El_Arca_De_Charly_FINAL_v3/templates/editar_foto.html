{% extends 'base.html' %}
{% block title %}Editar Foto - {{ pet.name }}{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Editar Foto de {{ pet.name }}</h2>
    <img src="{{ url_for('static', filename=pet.photo.split('/')[-1] if pet.photo else 'default-pet.jpg') }}" 
         alt="Foto actual" class="img-thumbnail mb-3" style="max-width: 300px;">
    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Nueva Foto (JPG/PNG):</label>
            <input type="file" name="foto" class="form-control" accept="image/*" required>
        </div>
        <button type="submit" class="btn btn-primary">Actualizar</button>
        <a href="{{ url_for('historial_clinico', petid=pet.id) }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}

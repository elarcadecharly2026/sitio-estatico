{% extends "base.html" %}

{% block content %}
<div style="max-width: 650px; margin: 0 auto; padding: 30px 20px;">
    <h2 style="color: #007bff; margin-bottom: 10px; font-size: 28px;">
        {% if contact %}✏️ Editar Contacto{% else %}➕ Nuevo Contacto{% endif %}
    </h2>
    <p style="color: #666; margin-bottom: 25px; font-size: 14px;">🏢 Proveedor: <strong>{{ supplier.name }}</strong></p>
    
    <form method="post" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Nombre del Contacto *</label>
            <input type="text" name="name" required style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;"
                   value="{{ contact.name if contact else '' }}">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Cargo/Puesto</label>
            <input type="text" name="position" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;"
                   value="{{ contact.position if contact else '' }}">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Email</label>
            <input type="email" name="email" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;"
                   value="{{ contact.email if contact else '' }}">
        </div>
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Teléfono</label>
            <input maxlength="10" pattern="\d{10}" type="text" name="phone" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px;"
                   value="{{ contact.phone if contact else '' }}">
        </div>
        
        <div style="margin-bottom: 25px;">
            <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px;">Notas</label>
            <textarea name="notes" rows="4" style="width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; font-family: inherit;">{{ contact.notes if contact else '' }}</textarea>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 1; padding: 13px; font-size: 16px; background: var(--text); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                {% if contact %}💾 Actualizar{% else %}✅ Crear Contacto{% endif %}
            </button>
            <a href="{{ url_for('suppliers_list') }}" style="flex: 1; text-align: center; padding: 13px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;">❌ Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

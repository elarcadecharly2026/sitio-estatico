{% extends "base.html" %}
{% block content %}
<h2>{{ 'Editar' if item else 'Nuevo' }} producto</h2>

<!-- UN SOLO FORM con enctype para subir archivos -->
<form method="post" class="form" enctype="multipart/form-data">
    <label>Código</label><input name="code" value="{{ item.code if item else '' }}">
    <label>Nombre</label><input name="name" value="{{ item.name if item else '' }}" required>
    <label>Categoría</label><input name="category" value="{{ item.category if item else '' }}">
    <label for="caducidad">Caducidad</label><input type="date" id="caducidad" name="caducidad" value="{{ item.caducidad.isoformat() if item and item.caducidad else '' }}">
    <label>Precio</label><input name="price" type="number" step="0.01" value="{{ item.price if item else '0' }}">
    <label>Cantidad</label><input name="quantity" type="number" step="1" value="{{ item.quantity if item else '0' }}">
    <label>Notas</label><textarea name="notes">{{ item.notes if item else '' }}</textarea>
    
    <!-- Imagen (ahora dentro del mismo form) -->
    <label>Imagen del producto:</label>
    <input type="file" id="productImage" name="image" accept="image/*,.png,.jpg,.jpeg,.gif" capture="environment">
    <img id="imagePreview" class="img-preview" style="max-width: 200px; max-height: 200px; display: none; margin-top: 10px;" alt="Vista previa">
    
    <button>Guardar</button>
</form>


<script>
document.getElementById('productImage').addEventListener('change', function(e) {
  const preview = document.getElementById('imagePreview');
  const file = e.target.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    // Opcional: Comprimir imagen
    compressImage(file);
  }
});

// Función opcional para comprimir (mejora subida)
function compressImage(file) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    canvas.width = 800;
    canvas.height = 600;
    ctx.drawImage(img, 0, 0, 800, 600);
    // Actualiza input con imagen comprimida si necesitas
  };
  img.src = URL.createObjectURL(file);
}
</script>

<style>.img-preview { border: 1px solid #ccc; border-radius: 5px; }</style>
{% endblock %}

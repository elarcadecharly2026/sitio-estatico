{% extends "base.html" %}
{% block content %}
<div style="max-width: 900px; margin: 0 auto; padding: 20px;">
  <h2>Compra a {{ supplier.name }}</h2>

  <form method="post">
    <div style="display:flex; gap:15px; margin-bottom:15px;">
      <div style="flex:1;">
        <label>IVA (%)</label>
        <input min="0" max="16" type="number" step="0.01" name="iva_pct" value="16" style="width:100%;">
      </div>
      <div style="flex:1;">
        <label>Descuento (%)</label>
        <input min="0" max="100" type="number" step="0.01" name="discount_pct" value="0" style="width:100%;">
      </div>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Costo unitario</th>
          <th>Subtotal</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr>
          <td>
            <select name="product_id[]" style="width:100%;">
              <option value="">-- Selecciona --</option>
              {% for p in products %}
              <option value="{{ p.id }}">{{ p.code }} - {{ p.name }}</option>
              {% endfor %}
            </select>
          </td>
          <td><input type="number" step="0" name="qty[]" value="1"></td>
          <td><input type="number" step="0.01" name="cost[]" value="0"></td>
          <td class="row-subtotal">0.00</td>
          <td><button type="button" onclick="removeRow(this)">X</button></td>
        </tr>
      </tbody>
    </table>

    <button type="button" onclick="addRow()">Agregar línea</button>

    <div style="margin-top:15px; text-align:right;">
      <div>Subtotal: <span id="subtotal">0.00</span></div>
      <div>IVA: <span id="iva">0.00</span></div>
      <div>Precio con descuento: <span id="precio_descuento">0.00</span></div>
      <div><strong>Total: <span id="total">0.00</span></strong></div>
    </div>


    <button type="submit" style="margin-top:15px;">Guardar compra</button>
  </form>
</div>

<script>
function recalc() {
  let tbody = document.getElementById('rows');
  let rows = tbody.querySelectorAll('tr');
  let subtotal = 0;
  rows.forEach(row => {
    let q = parseFloat(row.querySelector('input[name="qty[]"]').value || 0);
    let c = parseFloat(row.querySelector('input[name="cost[]"]').value || 0);
    let st = q * c;
    row.querySelector('.row-subtotal').textContent = st.toFixed(2);
    subtotal += st;
  });

  let iva_pct = parseFloat(document.querySelector('input[name="iva_pct"]').value || 0);
  let desc_pct = parseFloat(document.querySelector('input[name="discount_pct"]').value || 0);

  let desc = subtotal * desc_pct / 100.0;
  let precio_descuento = subtotal - desc;
  let iva = precio_descuento * iva_pct / 100.0;
  let total = precio_descuento + iva;

  document.getElementById('subtotal').textContent = subtotal.toFixed(2);
  document.getElementById('iva').textContent = iva.toFixed(2);
  document.getElementById('precio_descuento').textContent = precio_descuento.toFixed(2);
  document.getElementById('total').textContent = total.toFixed(2);

}

function addRow() {
  let tbody = document.getElementById('rows');
  let tr = tbody.querySelector('tr').cloneNode(true);
  tr.querySelectorAll('input').forEach(i => i.value = i.name.includes('qty') ? 1 : 0);
  tbody.appendChild(tr);
}

function removeRow(btn) {
  let tbody = document.getElementById('rows');
  if (tbody.querySelectorAll('tr').length > 1) {
    btn.closest('tr').remove();
    recalc();
  }
}

document.addEventListener('input', function(e) {
  if (e.target.matches('input[name="qty[]"], input[name="cost[]"], input[name="iva_pct"], input[name="discount_pct"]')) {
    recalc();
  }
});
</script>
{% endblock %}
